name: Publish to Smithery

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Publish stdio server to Smithery
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          set -euo pipefail
          npx --yes @smithery/cli@latest auth login --token "$SMITHERY_API_KEY"
          npx --yes @smithery/cli@latest mcp publish . \
            -n @modelbound/modelbound-mcp \
            --transport stdio
